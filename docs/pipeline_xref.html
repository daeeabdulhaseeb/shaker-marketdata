<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pipeline Search — Shaker Ventures Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#1d4ed8;--accent-light:#eff6ff;
  --success:#16a34a;--success-bg:#f0fdf4;
  --warn:#d97706;--warn-bg:#fffbeb;
  --danger:#dc2626;--danger-bg:#fef2f2;
  --info:#2563eb;--info-bg:#eff6ff;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;
}
body{font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg);min-height:100vh}
a{text-decoration:none;color:inherit}

/* Top nav */
.nav{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-brand{font-size:12px;font-weight:500;color:var(--text2);padding:14px 16px 14px 0;border-right:1px solid var(--border);margin-right:8px;white-space:nowrap}
.nav-link{font-size:12px;padding:14px 14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:inline-block}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--text);font-weight:500;border-bottom:2px solid var(--accent)}
.nav-right{margin-left:auto;font-size:11px;color:var(--text3)}

/* Page */
.page{padding:20px 24px 40px}
.page-title{font-size:15px;font-weight:500;margin-bottom:2px}
.page-sub{font-size:11px;color:var(--text2);margin-bottom:14px}

/* KPI grid */
.kpi-grid{display:grid;gap:10px;margin-bottom:14px}
.g5{grid-template-columns:repeat(5,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.kpi{background:var(--surface2);border-radius:var(--radius);padding:12px 14px}
.kpi.accent{background:var(--accent-light);border:1px solid #bfdbfe}
.kpi-label{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.kpi.accent .kpi-label{color:var(--accent)}
.kpi-val{font-size:20px;font-weight:500}
.kpi.accent .kpi-val{color:var(--accent)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:2px}
.kpi.accent .kpi-sub{color:var(--accent)}
.kpi-pos{font-size:10px;color:var(--success);margin-top:2px}
.kpi-neg{font-size:10px;color:var(--danger);margin-top:2px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:500;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--text2);margin-bottom:10px}
.two-col{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.three-col{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.filter-bar select,.filter-bar input{font-size:11px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);height:30px;outline:none;font-family:inherit}
.filter-bar input[type=text]{width:180px}
.filter-bar input[type=date]{width:130px}
.filter-label{font-size:10px;color:var(--text2);white-space:nowrap}
.filter-group{display:flex;align-items:center;gap:5px}
.filter-sep{width:1px;height:20px;background:var(--border2);margin:0 4px}
.btn-clear{font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;height:30px;font-family:inherit}
.btn-export{font-size:11px;padding:4px 12px;border:1px solid var(--accent);border-radius:var(--radius);background:var(--accent-light);color:var(--accent);cursor:pointer;height:30px;font-weight:500;font-family:inherit}
.btn-export:hover{background:var(--accent);color:#fff}
.filter-count{font-size:11px;color:var(--text3);white-space:nowrap}

/* Team pills */
.team-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.team-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;user-select:none;font-family:inherit}
.team-pill:hover{border-color:var(--accent);color:var(--accent)}
.team-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Tables */
.tbl-wrap{border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.tbl-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.tbl-scroll{height:420px;overflow-y:auto;overflow-x:auto}
.tbl-scroll-sm{max-height:300px;overflow-y:auto;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;background:var(--surface)}
th{font-size:10px;font-weight:500;color:var(--text2);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
tr.clickable{cursor:pointer}
.r{text-align:right;font-variant-numeric:tabular-nums}
.c{text-align:center}
.dim{color:var(--text3)}
.pos{color:var(--success)}
.neg{color:var(--danger)}
.warn{color:var(--warn)}
.truncate{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-strong{background:#dcfce7;color:#14532d}
.b-likely{background:#fef3c7;color:#92400e}
.b-none{background:#f3f4f6;color:#6b7280}
.b-unknown{background:#fee2e2;color:#991b1b}
.b-status{background:#eff6ff;color:#1e3a8a}
.b-client{background:#dbeafe;color:#1e3a8a}
.b-contractor{background:#fef3c7;color:#92400e}
.b-mep{background:#ede9fe;color:#5b21b6}

/* Coverage bar */
.cov-bar-wrap{height:6px;background:var(--border);border-radius:20px;overflow:hidden;margin-top:4px}
.cov-bar{height:100%;border-radius:20px;background:var(--accent)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:min(900px,100%);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.modal-head h3{font-size:14px;font-weight:500;margin-bottom:2px}
.modal-head p{font-size:11px;color:var(--text2)}
.modal-close{margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:var(--radius);font-size:11px;cursor:pointer;height:26px;font-family:inherit}
.modal-body{padding:14px 18px;overflow-y:auto;flex:1}

/* Chart */
.chart-container{position:relative;height:200px}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Shaker Ventures Intel</span>
  <a href="market.html" class="nav-link ">Market Overview</a>
<a href="coverage.html" class="nav-link ">Contractors Gap</a>
<a href="pipeline_xref.html" class="nav-link active">Pipeline Search</a>
  <span class="nav-right">Updated 22 Apr 2026, 10:10</span>
</nav>

<div class="page">

<div class="page-title">Pipeline Search</div>
<div class="page-sub">Search any Ventures project to see if it was quoted in the pipeline</div>

<div class="filter-bar">
  <input type="text" id="search" placeholder="Search project, client, contractor, SE, quotation...">
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Quoted</span>
    <select id="fMatch">
      <option value="">All</option>
      <option value="strong">Yes</option>
      <option value="likely">Likely</option>
      <option value="none">No</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Status</span>
    <select id="fStatus"><option value="">All</option><option value="Cancelled">Cancelled</option><option value="Completed">Completed</option><option value="Concept Stage">Concept Stage</option><option value="Construction">Construction</option><option value="Design">Design</option><option value="Feasibility Study">Feasibility Study</option><option value="On Hold">On Hold</option><option value="Tender for Construction">Tender for Construction</option><option value="Tender for Consultancy">Tender for Consultancy</option></select>
  </div>
  <span class="filter-count" id="rowCount" style="margin-left:auto"></span>
  <button class="btn-export" onclick="exportPipeline()">↓ Export</button>
</div>

<div class="tbl-wrap">
  <div style="height:calc(100vh - 220px);overflow-y:auto;overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>Ventures Project</th>
          <th>Status</th>
          <th>Quoted?</th>
          <th>Pipeline Project</th>
          <th>Quotation No.</th>
          <th>SE</th>
          <th>Team</th>
          <th>Probability</th>
          <th class="r">HVAC (SAR)</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<script>
var ALL_DATA = [];
function quotedBadge(t) {
  if (t === "strong") return '<span class="badge b-strong">Yes</span>';
  if (t === "likely") return '<span class="badge b-likely">Likely</span>';
  return '<span class="badge b-none">No</span>';
}
function applyFilters() {
  var q = (document.getElementById("search").value || "").toLowerCase();
  var mt = document.getElementById("fMatch").value || "";
  var st = document.getElementById("fStatus").value || "";
  var rows = ALL_DATA.filter(function(r) {
    if (q && !["Name","Client","Contractor","MEP Contractor","cr1_pipeline_name","cr1_quotation_no","cr1_se_name"].some(function(k){return r[k]&&String(r[k]).toLowerCase().includes(q);})) return false;
    if (mt && (r["cr1_match_type"]||"none") !== mt) return false;
    if (st && r["Project Status"] !== st) return false;
    return true;
  });
  document.getElementById("rowCount").textContent = rows.length.toLocaleString() + " of " + ALL_DATA.length.toLocaleString() + " projects";
  window._PIPELINE_ROWS = rows;
  var tb = document.getElementById("tb");
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:32px">No matching projects</td></tr>';
    return;
  }
  tb.innerHTML = rows.slice(0, 300).map(function(r) {
    var hvac = parseFloat(r["Hvac_SAR"]) || 0;
    return '<tr>'
      + '<td class="truncate" title="' + esc(r["Name"]||"") + '">' + esc(r["Name"]||"") + '</td>'
      + '<td><span class="badge b-status">' + esc(r["Project Status"]||"") + '</span></td>'
      + '<td>' + quotedBadge(r["cr1_match_type"]||"none") + '</td>'
      + '<td class="truncate dim" title="' + esc(r["cr1_pipeline_name"]||"") + '">' + esc(r["cr1_pipeline_name"]||"") + '</td>'
      + '<td style="color:var(--accent);font-size:10px">' + esc(r["cr1_quotation_no"]||"") + '</td>'
      + '<td>' + esc(r["cr1_se_name"]||"") + '</td>'
      + '<td>' + esc(r["cr1_team"]||"") + '</td>'
      + '<td>' + esc(r["cr1_quote_probability"]||"") + '</td>'
      + '<td class="r">' + sarFmt(hvac) + '</td>'
      + '</tr>';
  }).join("");
}
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("fMatch").addEventListener("change", applyFilters);
document.getElementById("fStatus").addEventListener("change", applyFilters);

fetch("data_pipeline_xref.json")
  .then(function(r) { if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
  .then(function(data) {
    ALL_DATA = data;
    applyFilters();
  })
  .catch(function(err) {
    console.error("Load error:", err);
    document.getElementById("tb").innerHTML = '<tr><td colspan="9" style="color:var(--danger);padding:20px">Failed to load data: ' + err.message + '</td></tr>';
  });

function exportPipeline() {
  var rows = window._PIPELINE_ROWS || [];
  if (!rows.length) { alert("No data to export."); return; }
  var data = rows.map(function(r) {
    return {
      "Ventures Project":  r["Name"] || "",
      "Status":            r["Project Status"] || "",
      "Region":            r["Region"] || "",
      "Client":            r["Client"] || "",
      "Contractor":        r["Contractor"] || "",
      "MEP Contractor":    r["MEP Contractor"] || "",
      "Quoted":            r["cr1_match_type"]==="strong" ? "Yes" : r["cr1_match_type"]==="likely" ? "Likely" : "No",
      "Pipeline Project":  r["cr1_pipeline_name"] || "",
      "Quotation No.":     r["cr1_quotation_no"] || "",
      "SE Name":           r["cr1_se_name"] || "",
      "Team":              r["cr1_team"] || "",
      "Probability":       r["cr1_quote_probability"] || "",
      "HVAC (SAR)":        parseFloat(r["Hvac_SAR"]) || 0,
    };
  });
  var ws = XLSX.utils.json_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Pipeline Search");
  XLSX.writeFile(wb, "pipeline_search_" + xlsxDate() + ".xlsx");
}
</script>
</div>

<script>
function esc(v){if(v===null||v===undefined||v==='')return'—';return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sarFmt(v){if(!v||isNaN(v))return'—';v=parseFloat(v);if(v>=1e9)return'SAR '+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'SAR '+(v/1e6).toFixed(1)+'M';if(v>0)return'SAR '+(v/1e3).toFixed(0)+'K';return'—'}
function numFmt(v){if(v===null||v===undefined||isNaN(v))return'—';return parseInt(v).toLocaleString()}
function pctFmt(v){if(v===null||v===undefined||isNaN(v))return'—';return (parseFloat(v)).toFixed(0)+'%'}
function matchBadge(t){if(t==='strong')return'<span class="badge b-strong">Matched</span>';if(t==='likely')return'<span class="badge b-likely">Likely</span>';return'<span class="badge b-none">—</span>'}
function xlsxDate(){return new Date().toISOString().slice(0,10)}
</script>
</body>
</html>
